services:
  backend:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
      - static_volume:/app/staticfiles
    expose:
      - "8000"
    # Linux'da konteynerdan xost mashinadagi MySQL/Redis'ga ulanish uchun
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - seismo_net

  frontend:
    build: ../seismo_fronted
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - seismo_net

volumes:
  static_volume:

networks:
  seismo_net:
    driver: bridge
