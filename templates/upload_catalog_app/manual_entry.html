{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-info text-white">
                    <h3 class="mb-0">
                        <i class="fas fa-keyboard"></i> Ma'lumotlarni  kiritish
                    </h3>
                </div>
                <div class="card-body">
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}

                    <form method="POST">
                        {% csrf_token %}

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="event_date" class="form-label">Sana <span class="text-danger">*</span></label>
                                <input type="date"
                                       class="form-control"
                                       id="event_date"
                                       name="event_date"
                                       required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="event_time" class="form-label">Vaqt <span class="text-danger">*</span></label>
                                <input type="time"
                                       class="form-control"
                                       id="event_time"
                                       name="event_time"
                                       step="1"
                                       required>
                                <div class="form-text">Soniyalarni ham kiriting</div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="latitude" class="form-label">Kenglik (Latitude) <span class="text-danger">*</span></label>
                                <input type="number"
                                       class="form-control"
                                       id="latitude"
                                       name="latitude"
                                       step="0.0001"
                                       min="-90"
                                       max="90"
                                       required
                                       placeholder="Masalan: 41.2995">

                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="longitude" class="form-label">Uzunlik (Longitude) <span class="text-danger">*</span></label>
                                <input type="number"
                                       class="form-control"
                                       id="longitude"
                                       name="longitude"
                                       step="0.0001"
                                       min="-180"
                                       max="180"
                                       required
                                       placeholder="Masalan: 69.2401">

                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="depth" class="form-label">Chuqurlik (km) <span class="text-danger">*</span></label>
                                <input type="number"
                                       class="form-control"
                                       id="depth"
                                       name="depth"
                                       step="0.1"
                                       min="0"
                                       required
                                       placeholder="Masalan: 10.5">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="magnitude" class="form-label">Magnituda <span class="text-danger">*</span></label>
                                <input type="number"
                                       class="form-control"
                                       id="magnitude"
                                       name="magnitude"
                                       step="0.1"
                                       min="0"
                                       required
                                       placeholder="Masalan: 4.5">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="epicenter" class="form-label">Epitsentr</label>
                            <input type="text"
                                   class="form-control"
                                   id="epicenter"
                                   name="epicenter"
                                   placeholder="Masalan: Toshkent viloyati">
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{% url 'catalog:catalog_list' %}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left"></i> Orqaga
                            </a>
                            <button type="submit" class="btn btn-info">
                                <i class="fas fa-save"></i> Saqlash
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
