 {% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seismo.uz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="#">Seismo.uz</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="#">Umumiy</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'magnitka:index'%}">Magnitka</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'app_anomaly:analysis' %}">Anomaliya</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'informativlik:informativity' %}" style="color: crimson">Informativlik</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'catalog:catalog_list' %}" style="color: crimson">Katalog</a></li>
                </ul>

                <div class="d-flex">
                    <a id="upload-btn" href="{% url 'download_base:index' %}" class="btn btn-outline-success me-2" style="display: none;">Bazaga yuklash</a>
                    <a id="analysis-btn" href="{% url 'seismos:selection' %}" class="btn btn-outline-info me-3" style="display: none;">GGS tahlili</a>

                    <a id="login-btn" href="/" class="btn btn-outline-dark me-2">Kirish</a>
                    <a id="logout-btn" href="#" class="btn btn-outline-dark me-2" style="display: none;">Chiqish</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="text-center bg-light py-5 hero-section">
        <div class="container">
            <h1 class="fw-bold mb-4">Seysmoprognostik ma'lumotlarni tahlil qilish boshqaruv paneli</h1>
        </div>
    </section>

    <!-- Bo‘sh qolgan qism -->
<div class="custom-image-block">
    <img src="{% static 'images/Picture.png' %}"
         alt="Seismo Image">
</div>
    <style>
        .custom-image-block {
    width: 100%;
    text-align: center;   /* rasmni markazga qo‘yish uchun */
    padding: 20px 0;      /* tepa va pastdan bo‘sh joy */
}

.custom-image-block img {
    max-width: 100%;      /* ekran bo‘yicha sig‘diradi */
    height: auto;         /* proporsiyani saqlaydi */
    border-radius: 10px;  /* yumaloq burchaklar (ixtiyoriy) */
    box-shadow: 0 4px 10px rgba(0,0,0,0.2); /* soyali dizayn (ixtiyoriy) */
}

    </style>





    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loginBtn = document.getElementById('login-btn');
            const logoutBtn = document.getElementById('logout-btn');
            const uploadBtn = document.getElementById('upload-btn');
            const analysisBtn = document.getElementById('analysis-btn');

            const accessToken = localStorage.getItem('access_token');

            // Foydalanuvchi tokeni borligini tekshirish
            if (accessToken) {
                // Login qilingan holat
                loginBtn.style.display = 'none'; // Kirish tugmasini yashiramiz
                logoutBtn.style.display = 'block'; // Chiqish tugmasini ko'rsatamiz
                uploadBtn.style.display = 'block'; // "Bazaga yuklash"ni ko'rsatamiz
                analysisBtn.style.display = 'block'; // "Seysmik tahlil"ni ko'rsatamiz
            } else {
                // Login qilinmagan holat
                loginBtn.style.display = 'block'; // Kirish tugmasini ko'rsatamiz
                logoutBtn.style.display = 'none'; // Chiqish tugmasini yashiramiz
                uploadBtn.style.display = 'none'; // "Bazaga yuklash"ni yashiramiz
                analysisBtn.style.display = 'none'; // "Seysmik tahlil"ni yashiramiz
            }

            // Chiqish tugmasini bosish hodisasini boshqarish
            logoutBtn.addEventListener('click', function(e) {
                e.preventDefault();
                localStorage.removeItem('access_token');
                localStorage.removeItem('refresh_token');
                window.location.href = '/'; // Foydalanuvchini login sahifasiga yo'naltirish
            });
        });
    </script>
</body>
</html>
