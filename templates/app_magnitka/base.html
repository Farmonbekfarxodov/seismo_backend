<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Magnitka monitoring{% endblock %}</title>

    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary:    #1565C0;
            --primary-lt: #E3F2FD;
            --accent:     #0288D1;
            --danger:     #C62828;
            --success:    #2E7D32;
            --gray-50:    #FAFAFA;
            --gray-100:   #F5F5F5;
            --gray-200:   #EEEEEE;
            --gray-400:   #BDBDBD;
            --gray-700:   #616161;
            --gray-900:   #212121;
            --radius:     8px;
            --shadow:     0 1px 4px rgba(0,0,0,.12);
            --shadow-md:  0 4px 12px rgba(0,0,0,.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--gray-100);
            color: var(--gray-900);
            min-height: 100vh;
        }

        .navbar {
            background: var(--primary);
            color: #fff;
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 32px;
            height: 56px;
            box-shadow: 0 2px 6px rgba(0,0,0,.25);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar-brand {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .navbar-links { display: flex; gap: 4px; margin-left: auto; }
        .navbar-links a {
            color: rgba(255,255,255,.85);
            text-decoration: none;
            padding: 6px 14px;
            border-radius: var(--radius);
            font-size: .9rem;
            transition: background .15s;
        }
        .navbar-links a:hover,
        .navbar-links a.active { background: rgba(255,255,255,.18); color: #fff; }

        .container { max-width: 1280px; margin: 0 auto; padding: 24px 20px; }

        .card {
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px 24px;
        }
        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary-lt);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 20px;
            border-radius: var(--radius);
            border: none;
            cursor: pointer;
            font-size: .9rem;
            font-weight: 500;
            transition: opacity .15s, transform .1s;
            text-decoration: none;
        }
        .btn:active { transform: scale(.97); }
        .btn-primary   { background: var(--primary); color: #fff; }
        .btn-primary:hover { opacity: .88; }
        .btn-secondary { background: var(--gray-200); color: var(--gray-700); }
        .btn-secondary:hover { background: var(--gray-400); }
        .btn-sm { padding: 5px 12px; font-size: .82rem; }

        .alert {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: .9rem;
            margin-bottom: 16px;
        }
        .alert-warning { background: #FFF8E1; border-left: 4px solid #FFC107; color: #5D4037; }
        .alert-danger  { background: #FFEBEE; border-left: 4px solid var(--danger); color: var(--danger); }

        .footer {
            text-align: center;
            padding: 20px;
            color: var(--gray-400);
            font-size: .8rem;
            margin-top: 32px;
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body>

<nav class="navbar">
    <a href="{% url 'magnitka:index' %}" class="navbar-brand">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        Magnitka monitoring
    </a>
    <div class="navbar-links">
        <a href="{% url 'magnitka:index' %}">🏠 Bosh sahifa</a>
    </div>
</nav>

<main class="container">
    {% block content %}{% endblock %}
</main>

<footer class="footer">
    Magnitka monitoring © {% now "Y" %}
</footer>

{% block extra_js %}{% endblock %}
</body>
</html>
