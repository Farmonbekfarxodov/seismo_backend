<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tizimga kirish</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; }
        .login-container { background: white; padding: 2em; border-radius: 8px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); width: 300px; text-align: center; }
        .login-container h2 { margin-bottom: 1em; color: #333; }
        .login-container input { width: calc(100% - 20px); padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        .login-container button { width: 100%; padding: 10px; background-color: #007bff; border: none; color: white; border-radius: 4px; cursor: pointer; }
        .login-container button:hover { background-color: #0056b3; }
        #message { color: red; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Tizimga kirish</h2>
        <form id="login-form">
            <input type="text" id="username" placeholder="Foydalanuvchi nomi" required>
            <input type="password" id="password" placeholder="Parol" required>
            <button type="submit">Kirish</button>
        </form>
        <p id="message"></p>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageElement = document.getElementById('message');

            try {
                const response = await fetch('http://127.0.0.1:8000/api/token/', { // Sizning backend manzilingiz
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Agar so'rov muvaffaqiyatli bo'lsa, tokenlarni saqlaymiz
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    messageElement.textContent = 'Kirish muvaffaqiyatli!';
                    messageElement.style.color = 'green';
                    
                    // Foydalanuvchini boshqa sahifaga yo'naltirish
                    window.location.href = '/index/'; // Tizimga kirgandan so'ng yo'naltiriladigan sahifa
                } else {
                    // Agar so'rovda xato bo'lsa
                    messageElement.textContent = data.detail || 'Foydalanuvchi nomi yoki parol notoʻgʻri.';
                    messageElement.style.color = 'red';
                }

            } catch (error) {
                console.error('Xatolik:', error);
                messageElement.textContent = 'Server bilan bogʻlanishda xatolik yuz berdi.';
                messageElement.style.color = 'red';
            }
        });
    </script>
</body>
</html>
